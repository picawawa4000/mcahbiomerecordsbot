name: Update Wiki

on:
  schedule:
    - cron: "0 * * * *"

  workflow_dispatch:

jobs:
  update:
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      - run: pip install -r requirements.txt

      - run: python update.py
        env:
          MW_PASSWORD: ${{ secrets.MW_PASSWORD }}